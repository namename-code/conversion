<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Конвертер валют</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Конвертер валют</h1>
            <p>Официальные курсы Центрального банка РФ</p>
        </header>

        <main class="converter-card">
            <div class="currency-group">
                <label for="amount">Сумма</label>
                <input type="number" id="amount" value="100" step="any" placeholder="Введите сумму">
            </div>

            <div class="currency-row">
                <div class="currency-group">
                    <label for="fromCurrency">Из валюты</label>
                    <select id="fromCurrency">
                        <option value="RUB">Российский рубль (RUB)</option>
                        <option value="USD" selected>Доллар США (USD)</option>
                        <option value="EUR">Евро (EUR)</option>
                        <option value="CNY">Китайский юань (CNY)</option>
                        <option value="GBP">Фунт стерлингов (GBP)</option>
                    </select>
                </div>

                <div class="swap-icon" id="swapBtn">⇄</div>

                <div class="currency-group">
                    <label for="toCurrency">В валюту</label>
                    <select id="toCurrency">
                        <option value="RUB" selected>Российский рубль (RUB)</option>
                        <option value="USD">Доллар США (USD)</option>
                        <option value="EUR">Евро (EUR)</option>
                        <option value="CNY">Китайский юань (CNY)</option>
                        <option value="GBP">Фунт стерлингов (GBP)</option>
                    </select>
                </div>
            </div>

            <div class="result-section">
                <div class="result-box">
                    <span class="result-label">Результат:</span>
                    <span class="result-value" id="result">—</span>
                </div>
                <div class="rate-info" id="rateInfo">
                    💵 Загрузка курсов ЦБ РФ...
                </div>
            </div>

            <div class="update-info" id="updateInfo">
                🔄 Загрузка официальных курсов...
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
